<!DOCTYPE html>
<html>
<head>
    <title>Login - SOULTUNE</title>
    <link rel="icon" type="image/x-icon" href="D:/lanz/Documents/my codes/project/items/tablogo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: url('items/new.png') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;

            overflow: hidden;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            margin-top: -120px;
            min-height: 200vh;
            padding: 20px;
        }
        header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #000;
            padding: 0px;
        }
        header h1 {
            font-family: 'Arial Black', Impact, sans-serif;
            color: #f0f0f0;
            -webkit-text-stroke: 2px #000;
            font-size: 44px;
            margin-left: 20px;
            position: relative;
            top: 10px;
        }
        .logo {
            width: 420px;
            height: 220px;
            margin-top: 140px;
            margin-bottom: 40px;
            margin-left: 720px;
        }
        .form-container {
            display: flex;
            align-items: center;
            flex-direction: column;
        }
        .login-form {
            align-items: center;
            text-align: left;
            width: 15%;
            padding: 15px;
            margin: 0px 750px;
            border-radius: 3px;
        }
        .login-form label {
            font-family: "Arial Black", Impact, sans-serif;
            font-size: 14px;
            color: #ffffff;
            -webkit-text-stroke: 0.5px #000000;
            margin-bottom: 2px;
            margin-left:-30px;
        }
        .login-form input {
            width: 120%;
            padding: 15px;
            margin-bottom: 20px;
            margin-left: -30px;
            border: 2px solid #000000;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            border: 1px solid #000000;
            border-radius: 12px;
            background: #d4d4d4;
            color: rgb(0, 0, 0);
            color: rgb(0, 0, 0);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-left: -30px;
        }
        button:hover {
            color: #ffffff;
            background-color: #ff9900aa;
        }
        .register-text {
            font-family: Arial, sans-serif;
            color: #ffffff;
            font-size: 10px;
            text-align: center;
            margin-top: -70px;
            margin-left: 110px;
        }
        .register-text a {
            color: #9fb6f7;
            text-decoration: none;
        }
        .register-text a:hover {
            color: #053f79;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header>
    <h1>SOULTUNE MUSIC SHOP</h1>
</header>

<div class="overlay">
        <img src="items/logonobg.png" class="logo" alt="Soultune-logo" height="200" width="80">

        <form action="home.html" autocomplete="on" class="form-container">
            <div class="login-form">
                <label for="email">Email:</label>
                <input type="email" required oninvalid="this.setCustomValidity('Please enter a valid email')"
       oninput="this.setCustomValidity('')" id="email" name="email" placeholder="Enter your email" required><br>
            </div>

            <div class="login-form">
                <label for="password">Password:</label>
                <input type="password" required oninvalid="this.setCustomValidity('Please enter your password')"
       oninput="this.setCustomValidity('')" id="password" name="password" placeholder="Enter your password" required><br>
            
            <p>
                <button type="submit">Log in</button>
            </p>
            </div>
            
                <div class="register-text">
                    Don't have an account? <a href="register.html">Register here</a>
                </div>
        </form>
</div>
</body>
</html>
